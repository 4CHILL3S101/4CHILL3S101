name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats SVG
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=4CHILL3S101&show_icons=true&count_private=true&theme=radical&token=${{ secrets.stats_token }}" -o github-stats.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats.svg
          git commit -m "update stats" || echo "No changes"
          git push
