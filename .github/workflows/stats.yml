name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats SVG
        run: |
          curl -L -s -H "Accept: image/svg+xml" \
          "https://github-readme-stats.vercel.app/api?username=4CHILL3S101&show_icons=true&count_private=true&theme=radical" \
          -o github-stats.svg

      - name: Validate SVG (CRITICAL)
        run: |
          if ! grep -q "<svg" github-stats.svg; then
            echo "❌ Invalid SVG generated"
            echo "---- DEBUG OUTPUT ----"
            cat github-stats.svg
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add github-stats.svg

          git diff --cached --quiet || git commit -m "update stats"

          git push
